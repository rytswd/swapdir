name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true

      - uses: cachix/cachix-action@v17
        with:
          name: swapdir
          # Create a write token at https://app.cachix.org/cache/swapdir
          # and add it as a repository secret named CACHIX_AUTH_TOKEN.
          # Pushes are skipped automatically when the token is absent
          # (e.g. pull requests from forks).
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build package
        run: nix build .#swapdir --print-build-logs

      - name: Run flake checks
        run: nix flake check --print-build-logs
