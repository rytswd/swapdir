name: Release

# Triggers, in order of reliability:
#   - push of a version tag (v*)      -> primary; deterministic, fires the
#     moment the tag is pushed, independent of GitHub's release plumbing.
#   - release published               -> covers releases cut in the UI.
#   - workflow_dispatch               -> manual runs (cache only, no upload).
on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            system: x86_64-linux
          - runner: macos-14
            system: aarch64-darwin
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true

      - uses: cachix/cachix-action@v17
        with:
          name: swapdir
          # Built paths are pushed to the cache automatically when this
          # token is set. Add it as the CACHIX_AUTH_TOKEN repo secret.
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build package
        run: nix build .#swapdir --print-build-logs

      - name: Stage binary
        # `install -m` works on both GNU (Linux) and BSD (macOS) install;
        # avoid `-D`, which is a GNU-only extension absent on macOS.
        run: install -m755 result/bin/swapdir "swapdir-${{ matrix.system }}"

      # Upload only when there is a tag to attach to (tag push or a
      # published release); skipped for branch-based workflow_dispatch runs.
      # action-gh-release creates the release for the tag if it doesn't
      # exist yet, and appends each platform's binary to it otherwise.
      - name: Attach binary to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: swapdir-${{ matrix.system }}
          fail_on_unmatched_files: true
